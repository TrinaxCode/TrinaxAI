name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tagged source
        uses: actions/checkout@v6

      - name: Verify package versions
        shell: bash
        run: |
          set -euo pipefail
          expected="${GITHUB_REF_NAME#v}"
          python_version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          frontend_version="$(node -p 'require("./chat-pwa/package.json").version')"
          lock_version="$(node -p 'require("./chat-pwa/package-lock.json").version')"
          cli_version="$(sed -n 's/^VERSION = "\([^"]*\)"$/\1/p' trinaxai_cli/app.py)"
          test "$expected" = "$python_version"
          test "$expected" = "$frontend_version"
          test "$expected" = "$lock_version"
          test "$expected" = "$cli_version"

      - name: Create simple release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          --repo "${GITHUB_REPOSITORY}"
          --verify-tag
          --title "TrinaxAI ${GITHUB_REF_NAME#v}"
          --generate-notes
