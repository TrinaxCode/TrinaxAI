name: Attested release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  verify:
    name: Verify tagged commit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout tagged source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-dev.txt
            pyproject.toml

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: chat-pwa/package-lock.json

      - name: Require tag and package versions to match
        shell: bash
        run: |
          set -euo pipefail
          expected="${GITHUB_REF_NAME#v}"
          python_version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          frontend_version="$(node -p 'require("./chat-pwa/package.json").version')"
          lock_version="$(node -p 'require("./chat-pwa/package-lock.json").version')"
          cli_version="$(python -c 'import ast; tree=ast.parse(open("trinaxai_cli/app.py", encoding="utf-8").read()); print(next(ast.literal_eval(node.value) for node in tree.body if isinstance(node, ast.Assign) and any(isinstance(target, ast.Name) and target.id == "VERSION" for target in node.targets)))')"
          test "$expected" = "$python_version"
          test "$expected" = "$frontend_version"
          test "$expected" = "$lock_version"
          test "$expected" = "$cli_version"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .
          npm ci --prefix chat-pwa

      - name: Run release checks
        run: make check

      - name: Enforce Python coverage floor
        run: >-
          pytest -q
          --cov=app --cov=trinaxai_cli --cov=trinaxai_core
          --cov=service_manager --cov=index
          --cov-report=term --cov-fail-under=55

      - name: Enforce frontend bundle budgets
        working-directory: chat-pwa
        run: npm run check:bundle

      - name: Audit locked Python dependencies
        run: pip-audit --require-hashes -r requirements.lock

      - name: Run high-severity static security gate
        run: >-
          bandit -r app trinaxai_cli service_manager.py index.py
          --severity-level high --confidence-level high

      - name: Detect committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Playwright Chromium
        working-directory: chat-pwa
        run: npx playwright install --with-deps chromium

      - name: Run browser E2E checks
        working-directory: chat-pwa
        run: npm run test:e2e

  release:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tagged source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build deterministic source archive and checksums
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          mkdir -p release
          git archive --format=tar --prefix="TrinaxAI-${version}/" "${GITHUB_SHA}" \
            | gzip -n > "release/TrinaxAI-${version}.tar.gz"
          (cd release && sha256sum "TrinaxAI-${version}.tar.gz" > SHA256SUMS)

      - name: Generate signed Sigstore provenance
        uses: actions/attest@v4
        with:
          subject-path: release/*

      - name: Publish immutable GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          release/*
          --repo "${GITHUB_REPOSITORY}"
          --verify-tag
          --generate-notes

      - name: Preserve release assets in Actions
        uses: actions/upload-artifact@v4
        with:
          name: trinaxai-${{ github.ref_name }}
          path: release/*
          if-no-files-found: error
