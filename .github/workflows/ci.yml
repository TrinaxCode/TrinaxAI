name: CI

on:
  push:
    branches: [main]
  pull_request:

# If GitHub Actions is temporarily blocked by billing, run the same commands
# locally with: make check

jobs:
  dco:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: DCO check
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          missing=0
          while read -r commit; do
            if ! git log -1 --format=%B "$commit" | grep -qi '^Signed-off-by:'; then
              echo "Missing Signed-off-by trailer in commit $commit"
              missing=1
            fi
          done < <(git rev-list "$base..$head")
          exit "$missing"

  python:
    name: python (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            pytest-command: >-
              pytest -q
              --cov=app --cov=trinaxai_cli --cov=trinaxai_core
              --cov=service_manager --cov=index
              --cov-report=xml:coverage.xml --cov-fail-under=55
          - os: macos-latest
            pytest-command: pytest -q
          - os: windows-latest
            pytest-command: python scripts/run_windows_pytest.py
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements.lock
            requirements-dev.txt
            pyproject.toml

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .

      - name: Python syntax check
        run: python -m py_compile rag_api.py config.py index.py trinaxai_cli.py

      - name: Ruff lint
        run: ruff check .

      - name: Pytest
        run: ${{ matrix.pytest-command }}

      - name: Upload Python coverage
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: coverage.xml
          if-no-files-found: error

  cli:
    name: cli (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements.lock
            requirements-dev.txt
            pyproject.toml

      - name: Install CLI
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .

      - name: CLI smoke tests
        run: |
          trinaxai --help
          trinaxai version
          trinaxai doctor
          trinaxai ask --help
          trinaxai index --help
          trinaxai update --help
          trinaxai uninstall --help

  scripts:
    name: scripts (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bash syntax checks
        if: runner.os != 'Windows'
        shell: bash
        run: |
          bash -n install.sh
          bash -n backup.sh
          bash -n uninstall.sh
          bash -n startup_ai.sh
          bash -n shutdown_ai.sh
          find scripts -name "*.sh" -print -exec bash -n {} \;

      - name: PowerShell syntax checks
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Get-Command pwsh | Out-Null
          $files = Get-ChildItem -Path . -Filter "*.ps1" -File
          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($file.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object {
                Write-Host "$($file.Name):$($_.Extent.StartLineNumber): $($_.Message)"
              }
              throw "PowerShell syntax check failed for $($file.Name)"
            }
            Write-Host "PowerShell syntax OK: $($file.Name)"
          }

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: chat-pwa/package-lock.json

      - name: Install frontend dependencies
        working-directory: chat-pwa
        run: npm ci

      - name: Frontend tests
        working-directory: chat-pwa
        run: npm test

      - name: TypeScript check
        working-directory: chat-pwa
        run: npx tsc --noEmit

      - name: Build PWA
        working-directory: chat-pwa
        run: npm run build

      - name: Enforce frontend bundle budgets
        working-directory: chat-pwa
        run: npm run check:bundle

      - name: Install Playwright Chromium
        working-directory: chat-pwa
        run: npx playwright install --with-deps chromium

      - name: Browser E2E (desktop and mobile)
        working-directory: chat-pwa
        run: npm run test:e2e

      - name: npm audit high
        working-directory: chat-pwa
        run: npm audit --audit-level=high

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-dev.txt

      - name: Install security tools
        run: python -m pip install -r requirements-dev.txt

      - name: Audit locked Python dependencies and emit SBOM
        run: >-
          pip-audit --require-hashes -r requirements.lock
          --format cyclonedx-json --output trinaxai-sbom.cdx.json

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trinaxai-python-sbom
          path: trinaxai-sbom.cdx.json
          if-no-files-found: warn

      - name: Bandit high-severity gate
        run: >-
          bandit -r app trinaxai_cli service_manager.py index.py
          --severity-level high --confidence-level high

  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  public-readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Public readiness audit
        run: python scripts/public_readiness.py
