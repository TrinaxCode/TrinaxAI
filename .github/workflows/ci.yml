name: CI

on:
  push:
    branches: [main]
  pull_request:

# If GitHub Actions is temporarily blocked by billing, run the same commands
# locally with: make check

jobs:
  dco:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: DCO check
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          missing=0
          while read -r commit; do
            if ! git log -1 --format=%B "$commit" | grep -qi '^Signed-off-by:'; then
              echo "Missing Signed-off-by trailer in commit $commit"
              missing=1
            fi
          done < <(git rev-list "$base..$head")
          exit "$missing"

  python:
    name: python (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            pytest-command: pytest -q
          - os: macos-latest
            pytest-command: pytest -q
          - os: windows-latest
            # Windows gets non-destructive Python/runtime coverage here.
            # Shell and PowerShell installer syntax are validated in scripts.
            pytest-command: >-
              pytest -q
              tests/test_cli_parser.py
              tests/test_cli_commands.py
              tests/test_cli_runtime.py
              tests/test_core_config.py
              tests/test_config_profiles.py
              tests/test_usage_summary.py
              tests/test_security_endpoints.py
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
          python -m pip install -e .

      - name: Python syntax check
        run: python -m py_compile rag_api.py config.py index.py trinaxai_cli.py

      - name: Ruff lint
        run: ruff check .

      - name: Pytest
        run: ${{ matrix.pytest-command }}

  cli:
    name: cli (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml

      - name: Install CLI
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
          python -m pip install -e .

      - name: CLI smoke tests
        run: |
          trinaxai --help
          trinaxai version
          trinaxai doctor
          trinaxai ask --help
          trinaxai index --help
          trinaxai update --help
          trinaxai uninstall --help

  scripts:
    name: scripts (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bash syntax checks
        if: runner.os != 'Windows'
        shell: bash
        run: |
          bash -n install.sh
          bash -n backup.sh
          bash -n uninstall.sh
          bash -n startup_ai.sh
          bash -n shutdown_ai.sh
          find scripts -name "*.sh" -print -exec bash -n {} \;

      - name: PowerShell syntax checks
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Get-Command pwsh | Out-Null
          $files = Get-ChildItem -Path . -Filter "*.ps1" -File
          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($file.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object {
                Write-Host "$($file.Name):$($_.Extent.StartLineNumber): $($_.Message)"
              }
              throw "PowerShell syntax check failed for $($file.Name)"
            }
            Write-Host "PowerShell syntax OK: $($file.Name)"
          }

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: chat-pwa/package-lock.json

      - name: Install frontend dependencies
        working-directory: chat-pwa
        run: npm ci

      - name: Frontend tests
        working-directory: chat-pwa
        run: npm test

      - name: TypeScript check
        working-directory: chat-pwa
        run: npx tsc --noEmit

      - name: Build PWA
        working-directory: chat-pwa
        run: npm run build

      - name: npm audit high
        working-directory: chat-pwa
        run: npm audit --audit-level=high

  public-readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Public readiness audit
        run: python scripts/public_readiness.py
