name: CI

on:
  push:
    branches: [main]
  pull_request:

# If GitHub Actions is temporarily blocked by billing, run the same commands
# locally with: make check

jobs:
  dco:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: DCO check
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          missing=0
          while read -r commit; do
            if ! git log -1 --format=%B "$commit" | grep -qi '^Signed-off-by:'; then
              echo "Missing Signed-off-by trailer in commit $commit"
              missing=1
            fi
          done < <(git rev-list "$base..$head")
          exit "$missing"

  python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
          python -m pip install -e .

      - name: Python syntax check
        run: python -m py_compile rag_api.py config.py index.py trinaxai_cli.py

      - name: Ruff lint
        run: ruff check .

      - name: Pytest
        run: pytest -q

  cli:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CLI
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
          python -m pip install -e .

      - name: CLI smoke tests
        run: |
          trinaxai --help
          trinaxai version
          trinaxai doctor
          trinaxai ask --help
          trinaxai index --help

  scripts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bash syntax checks
        run: |
          bash -n install.sh
          bash -n backup.sh
          bash -n uninstall.sh
          bash -n startup_ai.sh
          bash -n shutdown_ai.sh

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: chat-pwa/package-lock.json

      - name: Install frontend dependencies
        working-directory: chat-pwa
        run: npm ci

      - name: Frontend tests
        working-directory: chat-pwa
        run: npm test

      - name: TypeScript check
        working-directory: chat-pwa
        run: npx tsc --noEmit

      - name: Build PWA
        working-directory: chat-pwa
        run: npm run build

      - name: npm audit high
        working-directory: chat-pwa
        run: npm audit --audit-level=high

  public-readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Public readiness audit
        run: python scripts/public_readiness.py
