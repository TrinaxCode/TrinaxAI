name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  dco:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: DCO check
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          missing=0
          while read -r commit; do
            if ! git log -1 --format=%B "$commit" | grep -qi '^Signed-off-by:'; then
              echo "Missing Signed-off-by trailer in commit $commit"
              missing=1
            fi
          done < <(git rev-list "$base..$head")
          exit "$missing"

  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install ruff

      - name: Ruff lint
        run: ruff check *.py scripts/ --ignore E501

      - name: Python syntax check
        run: python -m py_compile *.py scripts/*.py

  frontend-and-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: chat-pwa/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install frontend dependencies
        working-directory: chat-pwa
        run: npm ci

      - name: Public readiness audit
        run: python scripts/public_readiness.py

      - name: TypeScript check
        working-directory: chat-pwa
        run: npx tsc --noEmit

      - name: Build PWA
        working-directory: chat-pwa
        run: npm run build

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: chat-pwa/package-lock.json

      - name: npm audit
        working-directory: chat-pwa
        run: npm audit --audit-level=high
