# ═══════════════════════════════════════════════════════════════
#  TrinaxAI + Continue.dev — Configuración Optimizada
#  Cópiala a:  ~/.continue/config.yaml   (y reinicia VSCode)
# ═══════════════════════════════════════════════════════════════
#
#  🧠  TRES MOTORES en uno:
#     1. RAG Local (TrinaxAI) → respuestas con contexto real de tus proyectos
#     2. Ollama Directo      → chat rápido, editar, aplicar diffs
#     3. @codebase (bge-m3)  → búsqueda semántica en el workspace actual
#
#  📋  Perfiles de hardware (setear TRINAXAI_PROFILE en .env):
#     8gb  → Qwen 3.5 4B/0.8B + Coder 1.5B
#     16gb → Qwen 3.5 9B/2B + Coder 3B (default)
#     max  → Qwen 3.5 27B + Coder 7B
#     ultra→ Qwen 3.5 35B-A3B + Coder 14B
#
#  🔧  Requisitos previos:
#     • TrinaxAI corriendo →  ./startup_ai.sh
#     • Ollama corriendo   →  ollama serve
#     • Modelos descargados → ollama list (qwen3, qwen2.5-coder, bge-m3)

name: TrinaxAI Local
version: 1.1.0
schema: v1

# ────────────────────────────────────────────────────────────────
#  MODELOS
# ────────────────────────────────────────────────────────────────
models:
  # ═══════════════════ RAG LOCAL (TRINAXAI) ═══════════════════
  #  Motor principal: recuperación híbrida (vector + BM25) + reranking
  #  + auto-ruteo de modelo. Responde con CITAS a tus archivos reales.
  #  Usa este modelo cuando quieras preguntar sobre tu base de código
  #  indexada completa (varios proyectos a la vez).
  - name: TrinaxAI RAG (Todos mis proyectos)
    provider: openai
    model: rag-local
    apiBase: https://localhost:3333/v1
    apiKey: local
    contextLength: 16384
    roles:
      - chat
    requestOptions:
      # Certificado auto-firmado de TrinaxAI (localhost).
      verifySsl: false
      timeout: 300000
    defaultCompletionOptions:
      temperature: 0.0
      maxTokens: 4096

  # ═══════════════════ OLLAMA DIRECTO ═════════════════════════

  # ── Código diario (rápido, ~2 GB RAM) ──
  - name: Qwen2.5-Coder 3B (Rápido)
    provider: ollama
    model: qwen2.5-coder:3b
    apiBase: http://localhost:11434
    contextLength: 32768
    roles: [chat, edit, apply]
    defaultCompletionOptions:
      temperature: 0.1
      maxTokens: 4096
      topP: 0.95
    requestOptions:
      timeout: 120000

  # ── Código potente (~4 GB RAM) ──
  - name: Qwen2.5-Coder 7B (Potente)
    provider: ollama
    model: qwen2.5-coder:7b
    apiBase: http://localhost:11434
    contextLength: 32768
    roles: [chat, edit, apply]
    defaultCompletionOptions:
      temperature: 0.1
      maxTokens: 8192
      topP: 0.95
    requestOptions:
      timeout: 180000

  # ── Código ultra (perfil ultra/workstation) ──
  - name: Qwen2.5-Coder 14B (Ultra)
    provider: ollama
    model: qwen2.5-coder:14b
    apiBase: http://localhost:11434
    contextLength: 32768
    roles: [chat, edit, apply]
    defaultCompletionOptions:
      temperature: 0.0
      maxTokens: 8192
      topP: 0.95
    requestOptions:
      timeout: 300000

  # ── Chat general (~3 GB RAM) ──
  #  Para preguntas conceptuales, documentación, explicaciones.
  #  Tool-calling y sin "thinking" (listo para flujos agénticos).
  - name: Qwen3.5 9B (General)
    provider: ollama
    model: qwen3.5:9b
    apiBase: http://localhost:11434
    contextLength: 131072
    roles: [chat]
    defaultCompletionOptions:
      temperature: 0.3
      maxTokens: 4096
    requestOptions:
      timeout: 120000

  # ── Autocompletado (tab) ──
  #  Modelo pequeño y rápido para sugerencias inline. No se usa para chat.
  - name: Qwen2.5-Coder 3B (Autocomplete)
    provider: ollama
    model: qwen2.5-coder:3b
    apiBase: http://localhost:11434
    contextLength: 4096
    roles: [autocomplete]
    defaultCompletionOptions:
      temperature: 0.0
      maxTokens: 256
      stop: ["\n\n", "```"]
    requestOptions:
      timeout: 8000

  # ── Visión (analizar capturas, diagramas, UI) ──
  - name: Qwen3-VL 4B Instruct (Visión)
    provider: ollama
    model: qwen3-vl:4b-instruct
    apiBase: http://localhost:11434
    contextLength: 8192
    roles: [chat]
    defaultCompletionOptions:
      temperature: 0.1
      maxTokens: 2048
    requestOptions:
      timeout: 120000

# ────────────────────────────────────────────────────────────────
#  MODELO POR DEFECTO
# ────────────────────────────────────────────────────────────────
#  "TrinaxAI RAG" para respuestas con contexto indexado de TODOS
#  tus proyectos. Cambia a "Qwen2.5-Coder 3B (Rápido)" si prefieres
#  respuestas directas sin RAG.
defaultModel: TrinaxAI RAG (Todos mis proyectos)

# ────────────────────────────────────────────────────────────────
#  AUTOCOMPLETADO INLINE (Tab)
# ────────────────────────────────────────────────────────────────
#  Se dispara al pausar de escribir. Usa el modelo de autocomplete
#  definido arriba (roles: [autocomplete]).
tabAutocompleteModel: Qwen2.5-Coder 3B (Autocomplete)

# ────────────────────────────────────────────────────────────────
#  EMBEDDINGS para @codebase
# ────────────────────────────────────────────────────────────────
#  bge-m3: multilingüe (español + inglés), 1024 dimensiones,
#  ventana de 8192 tokens. Muy superior a nomic-embed-text.
embeddingsProvider:
  provider: ollama
  model: bge-m3
  requestOptions:
    timeout: 60000

# ────────────────────────────────────────────────────────────────
#  RERANKING para @codebase
# ────────────────────────────────────────────────────────────────
#  Reordena los chunks por relevancia real a la pregunta.
#  NOTA: El modelo "TrinaxAI RAG" YA incluye reranking server-side
#  (bge-reranker-v2-m3). Esta sección es SOLO para @codebase.
rerank:
  provider: llm
  model: Qwen2.5-Coder 3B (Rápido)

# ────────────────────────────────────────────────────────────────
#  MENSAJE DE SISTEMA GLOBAL
# ────────────────────────────────────────────────────────────────
#  Se aplica a todos los modelos de chat. Mantenelo corto: cada
#  token aquí compite con el contexto útil.
systemMessage: |
  Eres TrinaxAI, un asistente de código local y open-source.
  - Responde en el mismo idioma de la pregunta.
  - Sé conciso, directo y técnico. Sin rodeos.
  - Usa Markdown para bloques de código.
  - Si no sabes algo, dilo. No inventes APIs ni funciones.
  - Para cambios de código, usa el formato diff o apply de Continue.
  - Prefiere editar archivos existentes antes que crear nuevos.
  - Respeta las convenciones del proyecto: linting, formatting, imports.

# ────────────────────────────────────────────────────────────────
#  PROVEEDORES DE CONTEXTO
# ────────────────────────────────────────────────────────────────
#  Define qué atajos (@) están disponibles en el chat.
contextProviders:
  - name: codebase
  - name: file
  - name: git
  - name: diff
  - name: terminal
  - name: search
  - name: docs
    params:
      urls: []
  - name: url
    params:
      presetUrls: []

# ────────────────────────────────────────────────────────────────
#  COMANDOS SLASH PERSONALIZADOS
# ────────────────────────────────────────────────────────────────
slashCommands:
  - name: rag
    description: Pregunta usando el RAG de TrinaxAI (todos tus proyectos indexados)
  - name: code
    description: Pregunta de código con Qwen2.5-Coder 7B (sin RAG)
  - name: fast
    description: Respuesta rápida con Qwen2.5-Coder 3B (sin RAG)
  - name: general
    description: Chat general con Qwen3 4B Instruct
