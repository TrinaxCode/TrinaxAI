<!DOCTYPE html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TrinaxAI" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="TrinaxAI Chat" />
    <meta name="format-detection" content="telephone=no" />

    <!-- PWA Meta -->
    <meta name="description" content="TrinaxAI — Ollama &amp; RAG at your fingertips." />
    <meta property="og:title" content="TrinaxAI Chat" />
    <meta property="og:description" content="TrinaxAI — Ollama &amp; RAG at your fingertips." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="TrinaxAI Chat" />
    <meta name="twitter:description" content="TrinaxAI — Ollama &amp; RAG at your fingertips." />

    <!-- iOS Splash Screen: removed generic 180x180 image (looks bad when stretched). -->
    <!-- iOS falls back to a solid black splash via manifest background_color (#000000). -->
    <!-- To add proper device-sized splash images, generate sizes for: -->
    <!--   iPhone SE: 1125x2436, iPhone 14 Pro: 1170x2532, iPad Pro 12.9: 2048x2732 -->

    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <!-- Android / Chrome PWA icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="shortcut icon" href="/favicon.ico" />

    <!-- Manifest: injected by vite-plugin-pwa at build time, served dynamically in dev -->

    <!-- Preload critical above-the-fold assets to reduce LCP -->
    <link rel="preload" as="image" href="/logo-of-app.webp" />
    <link rel="preload" as="image" href="/new-logo-for-AI.webp" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>TrinaxAI Chat</title>
  </head>
  <body class="bg-black text-white overflow-hidden h-dvh">
    <div id="root" class="h-dvh w-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
