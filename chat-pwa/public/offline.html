<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Offline — TrinaxAI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100dvh; width: 100%; }
    body {
      background: #000;
      color: #fff;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 24px;
      text-align: center;
      -webkit-font-smoothing: antialiased;
    }
    .icon { font-size: 48px; opacity: 0.4; }
    h1 { font-size: 20px; font-weight: 600; }
    p { font-size: 14px; opacity: 0.6; max-width: 280px; line-height: 1.5; }
    button {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff;
      padding: 10px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: rgba(255,255,255,0.18); }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>Sin conexión</h1>
  <p>No se puede alcanzar el equipo donde corre TrinaxAI. Vuelve a conectarte a ese equipo, a su red local o a tu VPN e inténtalo de nuevo.</p>
  <button onclick="location.reload()">Reintentar</button>
</body>
</html>
